services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nocobase}
      POSTGRES_DB: ${POSTGRES_DB:-nocobase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ecobase-prod-postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-nocobase} -d ${POSTGRES_DB:-nocobase}
      interval: 5s
      timeout: 5s
      retries: 30

  app:
    build:
      context: ../../..
      dockerfile: deploy/dokploy/Dockerfile
      args:
        ECOBASE_BASE_IMAGE: ${ECOBASE_BASE_IMAGE:-nocobase/nocobase:beta-full}
        ECOBASE_IMAGE_REVISION: ${ECOBASE_IMAGE_REVISION:-production}
    image: ${ECOBASE_APP_IMAGE:-ecobase/nocobase:prod-git}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    init: true
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY:?APP_KEY is required}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-https://ecobase.178-104-193-132.sslip.io}
      APP_AES_SECRET_KEY: ${APP_AES_SECRET_KEY:?APP_AES_SECRET_KEY is required}
      ENCRYPTION_FIELD_KEY: ${ENCRYPTION_FIELD_KEY:?ENCRYPTION_FIELD_KEY is required}
      DB_DIALECT: postgres
      DB_HOST: postgres
      DB_DATABASE: ${POSTGRES_DB:-nocobase}
      DB_USER: ${POSTGRES_USER:-nocobase}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      INIT_ROOT_EMAIL: ${INIT_ROOT_EMAIL:?INIT_ROOT_EMAIL is required}
      INIT_ROOT_PASSWORD: ${INIT_ROOT_PASSWORD:?INIT_ROOT_PASSWORD is required}
      LOGGER_LEVEL: ${LOGGER_LEVEL:-info}
    volumes:
      - ecobase-prod-uploads:/app/nocobase/storage/uploads
    labels:
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.ecobase-prod-web.rule=Host("ecobase.178-104-193-132.sslip.io")
      - traefik.http.routers.ecobase-prod-web.entrypoints=web
      - traefik.http.services.ecobase-prod-web.loadbalancer.server.port=80
      - traefik.http.routers.ecobase-prod-web.service=ecobase-prod-web
      - traefik.http.routers.ecobase-prod-web.middlewares=redirect-to-https@file
      - traefik.http.routers.ecobase-prod-websecure.rule=Host("ecobase.178-104-193-132.sslip.io")
      - traefik.http.routers.ecobase-prod-websecure.entrypoints=websecure
      - traefik.http.services.ecobase-prod-websecure.loadbalancer.server.port=80
      - traefik.http.routers.ecobase-prod-websecure.service=ecobase-prod-websecure
      - traefik.http.routers.ecobase-prod-websecure.tls.certresolver=letsencrypt
      - traefik.enable=true
    networks:
      - dokploy-network
      - default

volumes:
  ecobase-prod-postgres:
  ecobase-prod-uploads:

networks:
  dokploy-network:
    external: true
